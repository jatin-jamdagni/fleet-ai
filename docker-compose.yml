# ═══════════════════════════════════════════════════════════════════════════════
#  FLEET AI — Docker Compose (Local / Development)
#  Auto-generated by setup.sh
#  Usage: docker compose up -d
# ═══════════════════════════════════════════════════════════════════════════════
networks:
  fleet-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB:       fleetai
      POSTGRES_USER:     fleetai
      POSTGRES_PASSWORD: fleetai
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - fleet-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleetai"]
      interval: 5s
      timeout:  3s
      retries:  10

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - fleet-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: ./apps/backend/Dockerfile
    restart: unless-stopped
    env_file: ./apps/backend/.env
    environment:
      DATABASE_URL: "postgresql://fleetai:fleetai@postgres:5432/fleetai"
      REDIS_URL:    redis://redis:6379
    ports:
      - "3000:3000"
    networks:
      - fleet-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3000/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── Web Dashboard ────────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      args:
        VITE_API_URL: http://192.168.146.109:3000/api/v1
        VITE_WS_URL:  ws://192.168.146.109:3000
    restart: unless-stopped
    ports:
      - "5173:80"
    networks:
      - fleet-net
    depends_on:
      - backend

  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.50.0
    restart: unless-stopped
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    ports:
      - "9090:9090"
    networks:
      - fleet-net

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.3.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER:     admin
      GF_SECURITY_ADMIN_PASSWORD: fleet_95aaeff8
      GF_USERS_ALLOW_SIGN_UP:    "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    networks:
      - fleet-net
    depends_on:
      - prometheus
