version: "3.9"

# ─── Networks ────────────────────────────────────────────────────────────────
networks:
  fleet-internal:
    driver: bridge
    internal: true
  fleet-public:
    driver: bridge

# ─── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  postgres-data:
  redis-data:
  ollama-data:
  certbot-conf:
  certbot-www:
  nginx-logs:
  prometheus-data:
  grafana-data:


services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB:       fleetai
      POSTGRES_USER:     fleet
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./scripts/db/post_migrate.sql:/docker-entrypoint-initdb.d/02-post.sql
    networks:
      - fleet-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleet -d fleetai"]
      interval: 10s
      timeout:  5s
      retries:  10
    deploy:
      resources:
        limits:
          memory: 1g

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning
    volumes:
      - redis-data:/data
    networks:
      - fleet-internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5
    deploy:
      resources:
        limits:
          memory: 300m

  # ── Ollama ──────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - fleet-internal
    deploy:
      resources:
        limits:
          memory: 8g
  # Uncomment for GPU:
  # runtime: nvidia
  # environment:
  #   - NVIDIA_VISIBLE_DEVICES=all

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL:         postgresql://fleet:${POSTGRES_PASSWORD}@postgres:5432/fleetai
      JWT_SECRET:           ${JWT_SECRET}
      JWT_REFRESH_SECRET:   ${JWT_REFRESH_SECRET}
      REDIS_URL:            redis://:${REDIS_PASSWORD}@redis:6379
      AI_PROVIDER:          ${AI_PROVIDER:-ollama}
      OLLAMA_BASE_URL:      http://ollama:11434
      OLLAMA_CHAT_MODEL:    ${OLLAMA_CHAT_MODEL:-llama3}
      OLLAMA_EMBED_MODEL:   ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      VERTEX_API_KEY:       ${VERTEX_API_KEY:-}
      VERTEX_PROJECT_ID:    ${VERTEX_PROJECT_ID:-}
      ALLOWED_ORIGINS:      ${ALLOWED_ORIGINS}
      NODE_ENV:             production
      PORT:                 3000
      HOST:                 0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fleet-internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health | grep -q 'ok'"]
      interval: 15s
      timeout:  5s
      start_period: 40s
      retries:  5
    deploy:
      resources:
        limits:
          memory: 512m
      restart_policy:
        condition:    on-failure
        delay:        5s
        max_attempts: 3

  # ── Web Dashboard ─────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL:      ${VITE_API_URL}
        VITE_WS_URL:       ${VITE_WS_URL}
        VITE_MAPBOX_TOKEN: ${VITE_MAPBOX_TOKEN}
    restart: unless-stopped
    networks:
      - fleet-internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/health || exit 1"]
      interval: 15s
      timeout:  5s
      retries:  3
    deploy:
      resources:
        limits:
          memory: 64m

  # ── Nginx Reverse Proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot-conf:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - backend
      - web
    networks:
      - fleet-internal
      - fleet-public
    healthcheck:
      test: ["CMD-SHELL", "nginx -t || exit 1"]
      interval: 30s
      timeout:  10s
      retries:  3

  # ── Certbot (SSL certificates) ────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    # Run manually: docker compose run certbot certonly --webroot ...
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'
    networks:
      - fleet-public

  # ── DB Migrations (runs once on deploy) ──────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: builder
    command: sh -c "cd apps/backend && bunx prisma migrate deploy"
    environment:
      DATABASE_URL: postgresql://fleet:${POSTGRES_PASSWORD}@postgres:5432/fleetai
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fleet-internal
    restart: "no"


  # ── Prometheus ────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.50.0
    restart: unless-stopped
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    networks:
      - fleet-internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout:  5s
      retries:  3

  # ── Grafana ───────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.3.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER:     admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-fleet_grafana_2026}
      GF_SERVER_ROOT_URL:         https://${DOMAIN}/grafana
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_USERS_ALLOW_SIGN_UP:    "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - fleet-internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout:  5s
      retries:  3
    depends_on:
      - prometheus

        
