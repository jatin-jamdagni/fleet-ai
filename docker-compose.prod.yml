# ═══════════════════════════════════════════════════════════════════════════════
#  FLEET AI — Docker Compose (Production with Nginx + SSL)
#  Usage: docker compose -f docker-compose.prod.yml up -d
# ═══════════════════════════════════════════════════════════════════════════════
networks:
  fleet-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  certbot-conf:
  certbot-www:
  prometheus-data:
  grafana-data:

services:

  postgres:
    image: postgis/postgis:16-3.4
    restart: always
    environment:
      POSTGRES_DB:       fleetai
      POSTGRES_USER:     fleetai
      POSTGRES_PASSWORD: fleetai
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - fleet-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleetai"]
      interval: 5s

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis-data:/data
    networks:
      - fleet-net

  backend:
    build:
      context: .
      dockerfile: ./apps/backend/Dockerfile
    restart: always
    env_file: ./apps/backend/.env
    environment:
      DATABASE_URL: "postgresql://fleetai:fleetai@postgres:5432/fleetai"
      REDIS_URL:    redis://redis:6379
      NODE_ENV:     production
    networks:
      - fleet-net
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      args:
        VITE_API_URL: https://192.168.146.109/api/v1
        VITE_WS_URL:  wss://192.168.146.109
    restart: always
    networks:
      - fleet-net
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - certbot-conf:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    networks:
      - fleet-net
    depends_on:
      - backend
      - web

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  prometheus:
    image: prom/prometheus:v2.50.0
    restart: always
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - fleet-net

  grafana:
    image: grafana/grafana:10.3.0
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER:        admin
      GF_SECURITY_ADMIN_PASSWORD:    ${GRAFANA_PASSWORD}
      GF_SERVER_ROOT_URL:            https://${HOST}/grafana
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - fleet-net
