name: Deploy Fleet AI

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/fleet-ai

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB:       fleetai_test
          POSTGRES_USER:     fleet
          POSTGRES_PASSWORD: testpass
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: cd apps/backend && bunx prisma generate

      - name: Run migrations
        run: cd apps/backend && bunx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://fleet:testpass@localhost:5432/fleetai_test

      - name: Run tests
        run: cd apps/backend && bun test --timeout 30000
        env:
          DATABASE_URL: postgresql://fleet:testpass@localhost:5432/fleetai_test
          JWT_SECRET:   test-jwt-secret-minimum-32-chars-here
          JWT_REFRESH_SECRET: test-refresh-secret-minimum-32-chars

  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context:     .
          file:        apps/backend/Dockerfile
          push:        true
          tags:        ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:latest
          cache-from:  type=gha
          cache-to:    type=gha,mode=max

      - name: Build and push web
        uses: docker/build-push-action@v5
        with:
          context:     .
          file:        apps/web/Dockerfile
          push:        true
          tags:        ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-web:latest
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_WS_URL=${{ secrets.VITE_WS_URL }}
            VITE_MAPBOX_TOKEN=${{ secrets.VITE_MAPBOX_TOKEN }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/fleet-ai
            git pull origin main
            bash scripts/deploy/deploy.sh --skip-models