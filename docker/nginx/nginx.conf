user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    use                 epoll;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ─────────────────────────────────────────────────────────────
    log_format  main '$remote_addr - $remote_user [$time_local] '
                     '"$request" $status $body_bytes_sent '
                     '"$http_referer" "$http_user_agent" '
                     'rt=$request_time urt=$upstream_response_time';

    access_log  /var/log/nginx/access.log  main;

    # ── Performance ──────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  75;
    types_hash_max_size 4096;

    # ── Gzip ────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_comp_level   5;
    gzip_min_length   1024;
    gzip_types        text/plain text/css application/json
                      application/javascript text/xml image/svg+xml;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"    always;
    add_header X-Content-Type-Options   "nosniff"       always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy          "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Rate limiting zones ──────────────────────────────────────────────────
    limit_req_zone  $binary_remote_addr zone=api:10m    rate=30r/s;
    limit_req_zone  $binary_remote_addr zone=auth:10m   rate=5r/m;
    limit_req_zone  $binary_remote_addr zone=ws:10m     rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=conn:10m;

    # ── Upstream servers ─────────────────────────────────────────────────────
    upstream backend {
        server backend:3000;
        keepalive 32;
    }

    upstream web {
        server web:80;
        keepalive 16;
    }

    # ── HTTP → HTTPS redirect ────────────────────────────────────────────────
    server {
        listen      80;
        server_name _;

        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS Main Server ────────────────────────────────────────────────────
    server {
        listen       443 ssl http2;
        server_name  REPLACE_WITH_YOUR_DOMAIN;

        ssl_certificate     /etc/letsencrypt/live/REPLACE_WITH_YOUR_DOMAIN/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/REPLACE_WITH_YOUR_DOMAIN/privkey.pem;
        ssl_session_timeout 1d;
        ssl_session_cache   shared:SSL:50m;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        client_max_body_size  50m;

        # ── API Routes ───────────────────────────────────────────────────────
        location /api/ {
            limit_req   zone=api burst=50 nodelay;
            limit_conn  conn 20;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            proxy_read_timeout    60s;
            proxy_connect_timeout 10s;
            proxy_send_timeout    60s;

            proxy_buffering      on;
            proxy_buffer_size    8k;
            proxy_buffers        16 8k;
        }

        # ── Auth endpoints (stricter rate limit) ─────────────────────────────
        location ~ ^/api/v1/auth/(login|register) {
            limit_req   zone=auth burst=3 nodelay;
            limit_conn  conn 5;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
        }

        # ── WebSocket ────────────────────────────────────────────────────────
        location /ws {
            limit_req   zone=ws burst=5;

            proxy_pass             http://backend;
            proxy_http_version     1.1;
            proxy_set_header       Upgrade    $http_upgrade;
            proxy_set_header       Connection "upgrade";
            proxy_set_header       Host       $host;
            proxy_set_header       X-Real-IP  $remote_addr;
            proxy_read_timeout     86400s;   # Keep WS alive 24h
            proxy_send_timeout     86400s;
        }

        # ── SSE (AI streaming) ────────────────────────────────────────────────
        location ~ ^/api/v1/ai/ask {
            proxy_pass             http://backend;
            proxy_http_version     1.1;
            proxy_set_header       Host              $host;
            proxy_set_header       X-Real-IP         $remote_addr;
            proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header       Connection        "";
            proxy_buffering        off;              # Critical for SSE
            proxy_cache            off;
            proxy_read_timeout     300s;
            chunked_transfer_encoding on;
        }

        # ── Health check ──────────────────────────────────────────────────────
        location /health {
            proxy_pass         http://backend/health;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            access_log         off;
        }

        # ── Static / SPA ─────────────────────────────────────────────────────
        location / {
            proxy_pass         http://web;
            proxy_http_version 1.1;
            proxy_set_header   Host      $host;
            proxy_set_header   Connection "";
        }

        # ── Grafana ──────────────────────────────────────────────────────────────────
        location /grafana/ {
            proxy_pass         http://grafana:3000/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
}
    }
}