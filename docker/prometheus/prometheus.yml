global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    monitor: "fleet-ai"

scrape_configs:
  - job_name: "fleet-backend"
    static_configs:
      - targets: ["backend:3000"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]